name: CD

# nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout
# Safety analysis: This workflow uses workflow_run to deploy after CI passes.
# Checkout uses the specific head_sha from the completed CI run (not PR code).
# No untrusted inputs (head_ref, PR title) are interpolated into run: blocks.
# All jobs are gated on head_branch == 'main' and conclusion == 'success'.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Default: read-only. Only update-manifests and smoke jobs get elevated permissions.
permissions:
  contents: read

env:
  STACKIT_REGISTRY: registry.onstackit.cloud
  STACKIT_IMAGE_PREFIX: registry.onstackit.cloud/senticor/project

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push-frontend:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.head_branch == 'main'
       && github.event.workflow_run.actor.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    outputs:
      image_pushed: ${{ steps.push_frontend.outcome == 'success' }}
    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout.workflow-run-target-code-checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Authenticate to StackIT registry
        id: registry_auth
        env:
          STACKIT_REGISTRY_USER: ${{ secrets.STACKIT_REGISTRY_USER }}
          STACKIT_REGISTRY_PASSWORD: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}
        run: |
          REGISTRY_USER="$(printf '%s' "${STACKIT_REGISTRY_USER:-}" | tr -d '\r\n')"
          REGISTRY_PASSWORD="$(printf '%s' "${STACKIT_REGISTRY_PASSWORD:-}" | tr -d '\r\n')"

          if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "::warning::Missing StackIT registry credentials; skipping frontend image push."
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "${REGISTRY_PASSWORD}" | docker login "${STACKIT_REGISTRY}" --username "${REGISTRY_USER}" --password-stdin; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::StackIT registry authentication failed; skipping frontend image push."
          echo "can_push=false" >> "$GITHUB_OUTPUT"
      - name: Build and push frontend image
        id: push_frontend
        if: steps.registry_auth.outputs.can_push == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: frontend/Dockerfile
          pull: true
          push: true
          tags: ${{ env.STACKIT_IMAGE_PREFIX }}/frontend:${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Skip frontend image push
        if: steps.registry_auth.outputs.can_push != 'true'
        run: echo "Frontend image push skipped because registry authentication was unavailable."

  push-backend:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.head_branch == 'main'
       && github.event.workflow_run.actor.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    outputs:
      image_pushed: ${{ steps.push_backend.outcome == 'success' }}
    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout.workflow-run-target-code-checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Authenticate to StackIT registry
        id: registry_auth
        env:
          STACKIT_REGISTRY_USER: ${{ secrets.STACKIT_REGISTRY_USER }}
          STACKIT_REGISTRY_PASSWORD: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}
        run: |
          REGISTRY_USER="$(printf '%s' "${STACKIT_REGISTRY_USER:-}" | tr -d '\r\n')"
          REGISTRY_PASSWORD="$(printf '%s' "${STACKIT_REGISTRY_PASSWORD:-}" | tr -d '\r\n')"

          if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "::warning::Missing StackIT registry credentials; skipping backend image push."
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "${REGISTRY_PASSWORD}" | docker login "${STACKIT_REGISTRY}" --username "${REGISTRY_USER}" --password-stdin; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::StackIT registry authentication failed; skipping backend image push."
          echo "can_push=false" >> "$GITHUB_OUTPUT"
      - name: Build and push backend image
        id: push_backend
        if: steps.registry_auth.outputs.can_push == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: backend/Dockerfile
          pull: true
          push: true
          tags: ${{ env.STACKIT_IMAGE_PREFIX }}/backend:${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Skip backend image push
        if: steps.registry_auth.outputs.can_push != 'true'
        run: echo "Backend image push skipped because registry authentication was unavailable."

  push-storybook:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.head_branch == 'main'
       && github.event.workflow_run.actor.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    outputs:
      image_pushed: ${{ steps.push_storybook.outcome == 'success' }}
    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout.workflow-run-target-code-checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Authenticate to StackIT registry
        id: registry_auth
        env:
          STACKIT_REGISTRY_USER: ${{ secrets.STACKIT_REGISTRY_USER }}
          STACKIT_REGISTRY_PASSWORD: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}
        run: |
          REGISTRY_USER="$(printf '%s' "${STACKIT_REGISTRY_USER:-}" | tr -d '\r\n')"
          REGISTRY_PASSWORD="$(printf '%s' "${STACKIT_REGISTRY_PASSWORD:-}" | tr -d '\r\n')"

          if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "::warning::Missing StackIT registry credentials; skipping storybook image push."
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "${REGISTRY_PASSWORD}" | docker login "${STACKIT_REGISTRY}" --username "${REGISTRY_USER}" --password-stdin; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::StackIT registry authentication failed; skipping storybook image push."
          echo "can_push=false" >> "$GITHUB_OUTPUT"
      - name: Build and push storybook image
        id: push_storybook
        if: steps.registry_auth.outputs.can_push == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: frontend/Dockerfile.storybook
          build-args: |
            STORYBOOK_BASE=/storybook/
          pull: true
          push: true
          tags: ${{ env.STACKIT_IMAGE_PREFIX }}/storybook:${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Skip storybook image push
        if: steps.registry_auth.outputs.can_push != 'true'
        run: echo "Storybook image push skipped because registry authentication was unavailable."

  # push-agents: commented out — replaced by openclaw
  # push-agents:
  #   if: >-
  #     (github.event_name == 'workflow_dispatch') ||
  #     (github.event.workflow_run.conclusion == 'success'
  #      && github.event.workflow_run.head_branch == 'main'
  #      && github.event.workflow_run.actor.login != 'github-actions[bot]')
  #   runs-on: ubuntu-latest
  #   outputs:
  #     image_pushed: ${{ steps.push_agents.outcome == 'success' }}
  #   steps:
  #     - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
  #       with:
  #         ref: ${{ github.event.workflow_run.head_sha || github.sha }}
  #     - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
  #     - name: Authenticate to StackIT registry
  #       id: registry_auth
  #       env:
  #         STACKIT_REGISTRY_USER: ${{ secrets.STACKIT_REGISTRY_USER }}
  #         STACKIT_REGISTRY_PASSWORD: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}
  #       run: |
  #         ...
  #     - name: Build and push agents image
  #       id: push_agents
  #       if: steps.registry_auth.outputs.can_push == 'true'
  #       uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
  #       with:
  #         context: .
  #         file: agents/Dockerfile
  #         pull: true
  #         push: true
  #         tags: ${{ env.STACKIT_IMAGE_PREFIX }}/agents:${{ github.event.workflow_run.head_sha || github.sha }}

  push-openclaw:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.head_branch == 'main'
       && github.event.workflow_run.actor.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    outputs:
      image_pushed: ${{ steps.push_openclaw.outcome == 'success' }}
    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout.workflow-run-target-code-checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Authenticate to StackIT registry
        id: registry_auth
        env:
          STACKIT_REGISTRY_USER: ${{ secrets.STACKIT_REGISTRY_USER }}
          STACKIT_REGISTRY_PASSWORD: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}
        run: |
          REGISTRY_USER="$(printf '%s' "${STACKIT_REGISTRY_USER:-}" | tr -d '\r\n')"
          REGISTRY_PASSWORD="$(printf '%s' "${STACKIT_REGISTRY_PASSWORD:-}" | tr -d '\r\n')"

          if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "::warning::Missing StackIT registry credentials; skipping openclaw image push."
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "${REGISTRY_PASSWORD}" | docker login "${STACKIT_REGISTRY}" --username "${REGISTRY_USER}" --password-stdin; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::StackIT registry authentication failed; skipping openclaw image push."
          echo "can_push=false" >> "$GITHUB_OUTPUT"
      - name: Build and push openclaw image
        id: push_openclaw
        if: steps.registry_auth.outputs.can_push == 'true'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: openclaw/Dockerfile.alpha
          pull: true
          push: true
          tags: ${{ env.STACKIT_IMAGE_PREFIX }}/openclaw:${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Skip openclaw image push
        if: steps.registry_auth.outputs.can_push != 'true'
        run: echo "OpenClaw image push skipped because registry authentication was unavailable."

  container-integration:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.head_branch == 'main'
       && github.event.workflow_run.actor.login != 'github-actions[bot]')
    needs:
      - push-frontend
      - push-backend
      # - push-agents  # agents replaced by openclaw
      - push-storybook
      - push-openclaw
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout.workflow-run-target-code-checkout
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Authenticate to StackIT registry
        id: registry_auth
        env:
          STACKIT_REGISTRY_USER: ${{ secrets.STACKIT_REGISTRY_USER }}
          STACKIT_REGISTRY_PASSWORD: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}
        run: |
          REGISTRY_USER="$(printf '%s' "${STACKIT_REGISTRY_USER:-}" | tr -d '\r\n')"
          REGISTRY_PASSWORD="$(printf '%s' "${STACKIT_REGISTRY_PASSWORD:-}" | tr -d '\r\n')"

          if [ -z "${REGISTRY_USER}" ] || [ -z "${REGISTRY_PASSWORD}" ]; then
            echo "::warning::Missing StackIT registry credentials; skipping container integration tests."
            echo "can_test=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "${REGISTRY_PASSWORD}" | docker login "${STACKIT_REGISTRY}" --username "${REGISTRY_USER}" --password-stdin; then
            echo "can_test=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::StackIT registry authentication failed; skipping container integration tests."
          echo "can_test=false" >> "$GITHUB_OUTPUT"
      - name: Check all images were pushed
        id: check_images
        env:
          PUSHED_FRONTEND: ${{ needs.push-frontend.outputs.image_pushed }}
          PUSHED_BACKEND: ${{ needs.push-backend.outputs.image_pushed }}
          # PUSHED_AGENTS: ${{ needs.push-agents.outputs.image_pushed }}  # agents replaced by openclaw
          PUSHED_STORYBOOK: ${{ needs.push-storybook.outputs.image_pushed }}
          PUSHED_OPENCLAW: ${{ needs.push-openclaw.outputs.image_pushed }}
        run: |
          all_pushed="true"
          for svc in FRONTEND BACKEND STORYBOOK OPENCLAW; do
            val=$(eval echo "\$PUSHED_${svc}")
            if [ "$val" != "true" ]; then
              echo "::warning::${svc} image was not pushed; skipping container integration tests."
              all_pushed="false"
            fi
          done
          echo "all_pushed=${all_pushed}" >> "$GITHUB_OUTPUT"
      - name: Start services with docker compose
        if: steps.registry_auth.outputs.can_test == 'true' && steps.check_images.outputs.all_pushed == 'true'
        env:
          BACKEND_IMAGE: ${{ env.STACKIT_IMAGE_PREFIX }}/backend:${{ github.event.workflow_run.head_sha || github.sha }}
          FRONTEND_IMAGE: ${{ env.STACKIT_IMAGE_PREFIX }}/frontend:${{ github.event.workflow_run.head_sha || github.sha }}
          # AGENTS_IMAGE: not needed — agents replaced by openclaw
          STORYBOOK_IMAGE: ${{ env.STACKIT_IMAGE_PREFIX }}/storybook:${{ github.event.workflow_run.head_sha || github.sha }}
          OPENCLAW_IMAGE: ${{ env.STACKIT_IMAGE_PREFIX }}/openclaw:${{ github.event.workflow_run.head_sha || github.sha }}
        run: docker compose -f infra/docker-compose.ci-test.yml up -d --wait --wait-timeout 120
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.registry_auth.outputs.can_test == 'true' && steps.check_images.outputs.all_pushed == 'true'
        with:
          python-version: '3.12'
      - name: Install test dependencies
        if: steps.registry_auth.outputs.can_test == 'true' && steps.check_images.outputs.all_pushed == 'true'
        run: python -m pip install --upgrade pip httpx
      - name: Run container integration tests
        if: steps.registry_auth.outputs.can_test == 'true' && steps.check_images.outputs.all_pushed == 'true'
        run: |
          python scripts/smoke-container-integration.py \
            --backend-url http://localhost:8000 \
            --frontend-url http://localhost:8080 \
            --storybook-url http://localhost:6006 \
            --compose-project project-ci-test \
            --wait-seconds 120
      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.ci-test.yml logs --tail=200
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.ci-test.yml down -v --remove-orphans 2>/dev/null || true

  update-manifests:
    permissions:
      contents: write      # push deploy branch
      pull-requests: write  # create deploy PR (branch protection requires PRs)
      issues: write         # create deploy label if missing
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.head_branch == 'main'
       && github.event.workflow_run.actor.login != 'github-actions[bot]')
    needs:
      - container-integration
    runs-on: ubuntu-latest
    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout.workflow-run-target-code-checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
      - name: Update production image tags for Flux
        # All images verified by container-integration job (transitive dependency).
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          KUST="infra/k8s/overlays/production/kustomization.yaml"
          CONFIG="infra/k8s/overlays/production/configmap.yaml"
          CHANGELOG_FILE="CHANGELOG.md"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TIMESTAMP="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"

          git config user.email "ci@project.dev"
          git config user.name "github-actions[bot]"

          apply_changes() {
            sed -i "s|newName: .*/backend|newName: ${STACKIT_IMAGE_PREFIX}/backend|" "$KUST"
            sed -i "s|newName: .*/frontend|newName: ${STACKIT_IMAGE_PREFIX}/frontend|" "$KUST"
            sed -i "s|newName: .*/storybook|newName: ${STACKIT_IMAGE_PREFIX}/storybook|" "$KUST"
            # sed -i "s|newName: .*/agents|newName: ${STACKIT_IMAGE_PREFIX}/agents|" "$KUST"  # agents replaced by openclaw
            sed -i "s|newName: .*/openclaw|newName: ${STACKIT_IMAGE_PREFIX}/openclaw|" "$KUST"
            sed -i "s/newTag: .*/newTag: \"${IMAGE_TAG}\"/" "$KUST"
            sed -i "s|OPENCLAW_IMAGE: \".*\"|OPENCLAW_IMAGE: \"${STACKIT_IMAGE_PREFIX}/openclaw:${IMAGE_TAG}\"|" "$CONFIG"

            if git diff --quiet -- "$KUST" "$CONFIG"; then
              echo "No manifest change needed (already up to date)"
              return 1
            fi

            if [ ! -f "$CHANGELOG_FILE" ]; then
              printf '# Changelog\n\nDeployment updates written by CI.\n' > "$CHANGELOG_FILE"
            fi
            {
              echo
              echo "## ${TIMESTAMP} - ${IMAGE_TAG}"
              echo
              echo "- Updated \`${KUST}\` image tags to \`${IMAGE_TAG}\`."
              echo "- Updated \`${CONFIG}\` OpenClaw image to \`${STACKIT_IMAGE_PREFIX}/openclaw:${IMAGE_TAG}\`."
              echo "- Workflow run: ${RUN_URL}"
              echo "- Actor: \`${GITHUB_ACTOR}\`"
            } >> "$CHANGELOG_FILE"

            git add "$KUST" "$CONFIG" "$CHANGELOG_FILE"
            git commit -m "deploy: update image tag to ${IMAGE_TAG} [skip ci]"
          }

          # Branch protection requires PRs — create a deploy PR.
          git fetch origin main
          git checkout origin/main

          if ! apply_changes; then
            exit 0
          fi

          # Ensure the deploy label exists (idempotent)
          gh label create "deploy" --description "Automated deploy PRs" --color "1D76DB" 2>/dev/null || true

          # Close any stale deploy PRs (older image tags)
          EXISTING_PRS=$(gh pr list --label "deploy" --json number --jq '.[].number' 2>/dev/null || true)
          for pr in $EXISTING_PRS; do
            echo "Closing stale deploy PR #${pr}"
            gh pr close "$pr" --delete-branch --comment "Superseded by deploy of ${IMAGE_TAG}" || true
          done

          BRANCH="deploy/image-tag-${IMAGE_TAG:0:12}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          gh pr create \
            --title "deploy: update image tag to ${IMAGE_TAG:0:12}" \
            --body "$(cat <<PRBODY
          Automatic deploy PR — updates production image tags for Flux.

          **Image tag:** \`${IMAGE_TAG}\`
          **Workflow run:** ${RUN_URL}

          Merge this PR to trigger Flux reconciliation.
          PRBODY
          )" \
            --label "deploy" \
            --base main \
            --head "$BRANCH"

  smoke-openclaw-production:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.head_branch == 'main'
       && github.event.workflow_run.actor.login != 'github-actions[bot]')
    needs:
      - update-manifests
    runs-on: ubuntu-latest
    steps:
      # nosemgrep: yaml.github-actions.security.workflow-run-target-code-checkout.workflow-run-target-code-checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install smoke dependencies
        run: python -m pip install --upgrade pip httpx
      - name: Run OpenClaw smoke against production
        env:
          SMOKE_BASE_URL: https://project.senticor.runs.onstackit.cloud
          SMOKE_OPENROUTER_API_KEY: ${{ secrets.E2E_OPENROUTER_API_KEY }}
          SMOKE_OPENROUTER_MODEL: google/gemini-2.5-flash
        run: |
          if [ -z "${SMOKE_OPENROUTER_API_KEY:-}" ]; then
            echo "::warning::Missing E2E_OPENROUTER_API_KEY; skipping OpenClaw smoke."
            exit 0
          fi

          python scripts/smoke-openclaw-prod.py \
            --base-url "${SMOKE_BASE_URL}" \
            --api-key "${SMOKE_OPENROUTER_API_KEY}" \
            --model "${SMOKE_OPENROUTER_MODEL}" \
            --wait-seconds 900
