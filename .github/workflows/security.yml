name: Security

on:
  schedule:
    - cron: '0 4 * * *' # nightly, after E2E finishes
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  UV_CACHE_DIR: ~/.cache/uv
  PIP_CACHE_DIR: ~/.cache/pip

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── SAST ──────────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep + Bandit)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install SAST tools
        run: pip install semgrep bandit[sarif]

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif -o semgrep.sarif . || true

      - name: Run Bandit
        run: bandit -r backend/ agents/ -f sarif -o bandit.sarif || true

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Validate Bandit SARIF
        if: always()
        run: |
          python -c "import json; json.load(open('bandit.sarif'))" 2>/dev/null \
            || echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Bandit","version":"0.0.0"}},"results":[]}]}' > bandit.sarif

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: bandit.sarif
          category: bandit
        continue-on-error: true

      - name: Upload SAST artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sast-reports
          path: |
            semgrep.sarif
            bandit.sarif
          if-no-files-found: ignore

  # ── SCA (Software Composition Analysis) ───────────────────────────────
  sca:
    name: SCA (Trivy filesystem)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      # misconfig scanner excluded: k3s single-node deployment, KSV/DS rules
      # are not actionable. Dockerfile security is covered by Semgrep.
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          trivyignores: .trivyignore
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy SCA SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-sca
        continue-on-error: true

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sca-reports
          path: trivy-fs.sarif
          if-no-files-found: ignore

  # ── Container Image Scanning ──────────────────────────────────────────
  container-scan:
    name: Container scan (Trivy image)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Build backend image
        run: docker build --pull -t project-backend:scan -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build --pull -t project-frontend:scan -f frontend/Dockerfile .

      - name: Build agents image
        run: docker build --pull -t project-agents:scan -f agents/Dockerfile .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          scan-type: image
          image-ref: project-backend:scan
          trivyignores: .trivyignore
          format: sarif
          output: trivy-image-backend.sarif

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          scan-type: image
          image-ref: project-frontend:scan
          trivyignores: .trivyignore
          format: sarif
          output: trivy-image-frontend.sarif

      - name: Scan agents image
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          scan-type: image
          image-ref: project-agents:scan
          trivyignores: .trivyignore
          format: sarif
          output: trivy-image-agents.sarif

      - name: Upload backend image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: trivy-image-backend.sarif
          category: trivy-image-backend
        continue-on-error: true

      - name: Upload frontend image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: trivy-image-frontend.sarif
          category: trivy-image-frontend
        continue-on-error: true

      - name: Upload agents image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: trivy-image-agents.sarif
          category: trivy-image-agents
        continue-on-error: true

      - name: Upload container scan artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: container-scan-reports
          path: |
            trivy-image-backend.sarif
            trivy-image-frontend.sarif
            trivy-image-agents.sarif
          if-no-files-found: ignore

  # ── Secret Detection ──────────────────────────────────────────────────
  secrets:
    name: Secret detection (Gitleaks)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif || true

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
        continue-on-error: true

      - name: Upload secrets artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: secrets-reports
          path: gitleaks.sarif
          if-no-files-found: ignore

  # ── DAST (Dynamic Application Security Testing) ───────────────────────
  dast:
    name: DAST (ZAP baseline)
    continue-on-error: true
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: project
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: project
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U project -d project"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: project
      POSTGRES_PASSWORD: ci_test_password
      POSTGRES_DB: project
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      DATABASE_URL: postgresql://project:ci_test_password@localhost:5432/project
      VITE_API_BASE_URL: http://localhost:8000
      MEILI_URL: ''
      JWT_SECRET: ci-jwt-secret
      DELEGATION_JWT_SECRET: ci-delegation-jwt-secret
      ENCRYPTION_KEY: t9se0op9pzW1QFbY3nnGn-5zzElb4Tjl84fjnCb6zCY=
      OPENROUTER_API_KEY: ci-dummy-openrouter-key
      AGENTS_URL: http://localhost:8002
      CORS_ORIGINS: http://localhost:5173
      SESSION_BIND_USER_AGENT: 'false'
      TESTING: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock
            agents/pyproject.toml
            agents/uv.lock

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache uv downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-security-${{ hashFiles('backend/uv.lock', 'agents/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-security-
            ${{ runner.os }}-uv-backend-

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: |
          cd backend && uv sync --quiet --all-groups --all-extras
          cd ../agents && uv sync --quiet
          cd ../frontend && npm ci --ignore-scripts --silent

      - name: Start application stack
        run: |
          set -euo pipefail

          wait_for() {
            local url="$1"
            local label="$2"
            local retries="$3"
            local sleep_s="$4"
            for _ in $(seq 1 "$retries"); do
              if curl -sf "$url" >/dev/null 2>&1; then
                echo "$label is ready"
                return 0
              fi
              sleep "$sleep_s"
            done
            echo "$label failed to become ready: $url"
            return 1
          }

          cd backend
          uv run python -m app.db_init

          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          wait_for "http://localhost:8000/health" "Backend" 45 1

          uv run python -m app.worker --loop > /tmp/worker.log 2>&1 &

          cd ../agents
          uv run uvicorn app:app --host 0.0.0.0 --port 8002 > /tmp/agents.log 2>&1 &
          wait_for "http://localhost:8002/health" "Agents" 20 1 || echo "Agents health endpoint not ready; continuing"

          cd ../frontend
          npm run dev -- --host 0.0.0.0 --port 5173 > /tmp/frontend.log 2>&1 &
          wait_for "http://localhost:5173" "Frontend" 75 1

      - name: Fetch OpenAPI spec for ZAP
        run: curl -sf http://localhost:8000/openapi.json -o /tmp/openapi.json || echo "OpenAPI spec not available; ZAP will crawl only"

      - name: ZAP baseline scan (Frontend)
        uses: zaproxy/action-baseline@2b5fc7f98d837319798ab7f128ea50b7d40563b6 # v0.14.0
        with:
          target: http://localhost:5173
          rules_file_name: ''
          cmd_options: '-a -j'
          allow_issue_writing: false
          artifact_name: zap_scan_frontend
        continue-on-error: true

      - name: ZAP baseline scan (API)
        uses: zaproxy/action-baseline@2b5fc7f98d837319798ab7f128ea50b7d40563b6 # v0.14.0
        with:
          target: http://localhost:8000
          rules_file_name: ''
          cmd_options: '-a -j'
          allow_issue_writing: false
          artifact_name: zap_scan_api
        continue-on-error: true

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dast-reports
          path: |
            /tmp/backend.log
            /tmp/worker.log
            /tmp/agents.log
            /tmp/frontend.log
            zap_scan_report.*
          if-no-files-found: ignore
          overwrite: true
