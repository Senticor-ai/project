name: Security

on:
  schedule:
    - cron: '0 4 * * *' # nightly, after E2E finishes
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  UV_CACHE_DIR: ~/.cache/uv
  PIP_CACHE_DIR: ~/.cache/pip

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── SAST ──────────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep + Bandit)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SAST tools
        run: pip install semgrep bandit[sarif]

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif -o semgrep.sarif . || true

      - name: Run Bandit
        run: bandit -r backend/ agents/ -f sarif -o bandit.sarif || true

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit
        continue-on-error: true

      - name: Upload SAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            semgrep.sarif
            bandit.sarif
          if-no-files-found: ignore

  # ── SCA (Software Composition Analysis) ───────────────────────────────
  sca:
    name: SCA (Trivy filesystem)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy SCA SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-sca
        continue-on-error: true

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: trivy-fs.sarif
          if-no-files-found: ignore

  # ── Container Image Scanning ──────────────────────────────────────────
  container-scan:
    name: Container scan (Trivy image)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t project-backend:scan -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build -t project-frontend:scan -f frontend/Dockerfile .

      - name: Build agents image
        run: docker build -t project-agents:scan -f agents/Dockerfile .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: project-backend:scan
          format: sarif
          output: trivy-image-backend.sarif

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: project-frontend:scan
          format: sarif
          output: trivy-image-frontend.sarif

      - name: Scan agents image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: project-agents:scan
          format: sarif
          output: trivy-image-agents.sarif

      - name: Upload backend image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-backend.sarif
          category: trivy-image-backend
        continue-on-error: true

      - name: Upload frontend image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-frontend.sarif
          category: trivy-image-frontend
        continue-on-error: true

      - name: Upload agents image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-agents.sarif
          category: trivy-image-agents
        continue-on-error: true

      - name: Upload container scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-reports
          path: |
            trivy-image-backend.sarif
            trivy-image-frontend.sarif
            trivy-image-agents.sarif
          if-no-files-found: ignore

  # ── Secret Detection ──────────────────────────────────────────────────
  secrets:
    name: Secret detection (Gitleaks)
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --report-format sarif --report-path gitleaks.sarif
        env:
          GITLEAKS_LICENSE: ''

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
        continue-on-error: true

      - name: Upload secrets artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-reports
          path: gitleaks.sarif
          if-no-files-found: ignore

  # ── DAST (Dynamic Application Security Testing) ───────────────────────
  dast:
    name: DAST (ZAP baseline)
    continue-on-error: true
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: project
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: project
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U project -d project"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: project
      POSTGRES_PASSWORD: ci_test_password
      POSTGRES_DB: project
      POSTGRES_HOST: localhost
      POSTGRES_PORT: '5432'
      DATABASE_URL: postgresql://project:ci_test_password@localhost:5432/project
      VITE_API_BASE_URL: http://localhost:8000
      MEILI_URL: ''
      JWT_SECRET: ci-jwt-secret
      DELEGATION_JWT_SECRET: ci-delegation-jwt-secret
      ENCRYPTION_KEY: t9se0op9pzW1QFbY3nnGn-5zzElb4Tjl84fjnCb6zCY=
      OPENROUTER_API_KEY: ci-dummy-openrouter-key
      AGENTS_URL: http://localhost:8002
      CORS_ORIGINS: http://localhost:5173
      SESSION_BIND_USER_AGENT: 'false'
      TESTING: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock
            agents/pyproject.toml
            agents/uv.lock

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-security-${{ hashFiles('backend/uv.lock', 'agents/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-security-
            ${{ runner.os }}-uv-backend-

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: |
          cd backend && uv sync --quiet --all-groups --all-extras
          cd ../agents && uv sync --quiet
          cd ../frontend && npm ci --ignore-scripts --silent

      - name: Start application stack
        run: |
          set -euo pipefail

          wait_for() {
            local url="$1"
            local label="$2"
            local retries="$3"
            local sleep_s="$4"
            for _ in $(seq 1 "$retries"); do
              if curl -sf "$url" >/dev/null 2>&1; then
                echo "$label is ready"
                return 0
              fi
              sleep "$sleep_s"
            done
            echo "$label failed to become ready: $url"
            return 1
          }

          cd backend
          uv run python -m app.db_init

          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          wait_for "http://localhost:8000/health" "Backend" 45 1

          uv run python -m app.worker --loop > /tmp/worker.log 2>&1 &

          cd ../agents
          uv run uvicorn app:app --host 0.0.0.0 --port 8002 > /tmp/agents.log 2>&1 &
          wait_for "http://localhost:8002/health" "Agents" 20 1 || echo "Agents health endpoint not ready; continuing"

          cd ../frontend
          npm run dev -- --host 0.0.0.0 --port 5173 > /tmp/frontend.log 2>&1 &
          wait_for "http://localhost:5173" "Frontend" 75 1

      - name: Fetch OpenAPI spec for ZAP
        run: curl -sf http://localhost:8000/openapi.json -o /tmp/openapi.json || echo "OpenAPI spec not available; ZAP will crawl only"

      - name: ZAP baseline scan (Frontend)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:5173
          rules_file_name: ''
          cmd_options: '-a -j'
          allow_issue_writing: false
        continue-on-error: true

      - name: ZAP baseline scan (API)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8000
          rules_file_name: ''
          cmd_options: '-a -j'
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: |
            /tmp/backend.log
            /tmp/worker.log
            /tmp/agents.log
            /tmp/frontend.log
            zap_scan_report.*
          if-no-files-found: ignore
