name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'infra/k8s/overlays/production/**'
      - 'CHANGELOG.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
  UV_CACHE_DIR: ~/.cache/uv
  PIP_CACHE_DIR: ~/.cache/pip

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-drift:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Check docs drift
        run: bash scripts/check-doc-drift.sh

  backend-migration-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Check migration policy
        run: bash scripts/check-alembic-policy.sh

  k8s-security-context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate K8s securityContext (non-root)
        run: bash scripts/check-k8s-security-context.sh

  frontend-lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Lint frontend
        run: |
          cd frontend
          npm ci --ignore-scripts --silent
          npm run lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Typecheck frontend
        run: |
          cd frontend
          npm ci --ignore-scripts --silent
          npm run type-check

  frontend-security:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm ci --ignore-scripts --silent
          npm audit

  backend-lint:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock
      - name: Cache backend uv downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-backend-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-backend-
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Lint backend
        run: |
          cd backend
          uv sync --quiet --all-groups --all-extras
          uv run ruff check .

  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock
      - name: Cache backend uv downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-backend-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-backend-
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Typecheck backend
        run: |
          cd backend
          uv sync --quiet --all-groups --all-extras
          uv run mypy app/

  backend-security:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Audit backend dependencies
        run: |
          cd backend
          uvx pip-audit

  # agents-lint: commented out — agents replaced by openclaw
  # agents-typecheck: commented out — agents replaced by openclaw

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Run frontend unit tests
        run: |
          cd frontend
          npm ci --ignore-scripts --silent
          CI=1 npx vitest run --project=unit

  frontend-unit-coverage:
    # Coverage should not block CI, but failures are still tracked by the
    # CI Failure Tickets workflow.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Run frontend unit coverage report
        run: |
          cd frontend
          npm ci --ignore-scripts --silent
          CI=1 npx vitest run --project=unit --coverage.enabled --coverage.reporter=text --coverage.reporter=cobertura --coverage.reporter=json-summary --coverage.reportsDirectory=coverage/unit
      - name: Check unit-only thresholds (50%)
        if: always()
        run: |
          cd frontend
          npm run test:coverage:check:unit
      - name: Upload frontend unit coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-unit-coverage
          path: frontend/coverage/unit/
          if-no-files-found: ignore

  frontend-combined-coverage:
    # Combined (unit + storybook) coverage must reach 80%.
    # Coverage should not block CI, but failures are tracked.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --silent
      - name: Install Playwright browser
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      - name: Run combined coverage (unit + storybook)
        run: |
          cd frontend
          npm run test:coverage:combined
      - name: Check combined thresholds (80%)
        if: always()
        run: |
          cd frontend
          npm run test:coverage:check:combined
      - name: Upload frontend combined coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-combined-coverage
          path: frontend/coverage/combined/
          if-no-files-found: ignore

  frontend-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --silent
      - name: Install Playwright browser for storybook tests
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      - name: Run storybook tests
        run: |
          cd frontend
          STORYBOOK_TESTS=1 CI=1 npx vitest run --project=storybook

  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock
      - name: Cache backend uv downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-backend-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-backend-
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Run backend unit tests
        run: |
          cd backend
          uv sync --quiet --all-groups --all-extras
          uv run pytest -m unit -q --maxfail=1

  # agents-unit: commented out — agents replaced by openclaw
  # agents-dogfooding: commented out — agents replaced by openclaw

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: project
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: project
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U project -d project"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: project
      POSTGRES_PASSWORD: ci_test_password
      POSTGRES_DB: project
      DATABASE_URL: postgresql://project:ci_test_password@localhost:5432/project
      ENCRYPTION_KEY: t9se0op9pzW1QFbY3nnGn-5zzElb4Tjl84fjnCb6zCY=
      VITE_API_BASE_URL: http://localhost:8000
      MEILI_URL: ''
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock
      - name: Cache backend uv downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-backend-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-backend-
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Run backend integration tests
        run: |
          cd backend
          uv sync --quiet --all-groups --all-extras
          uv run pytest -m "not unit" -q --maxfail=3 --cov=app --cov-report=term-missing --cov-report=xml:coverage/integration.xml --cov-report=html:coverage/integration
      - name: Upload backend integration coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-integration-coverage
          path: |
            backend/coverage/integration/
            backend/coverage/integration.xml
          if-no-files-found: ignore

  frontend-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/uv.lock
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cache backend uv downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-backend-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-backend-
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Run frontend contract tests
        run: |
          cd backend
          uv sync --quiet --all-groups --all-extras
          uv run python scripts/export_schemas.py
          cd ../frontend
          npm ci --ignore-scripts --silent
          CI=1 npx vitest run --project=unit -t "JSON Schema contract"

