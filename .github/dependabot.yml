# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions — keep SHA-pinned actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"

  # Backend Python dependencies (FastAPI, SQLAlchemy, etc.)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    reviewers:
      - "project-frontend-team"
    labels:
      - "dependencies"
      - "backend"
      - "python"
    commit-message:
      prefix: "deps(backend)"
      include: "scope"
    # Group minor and patch updates to reduce PR noise
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Agents Python dependencies — disabled while Copilot/Haystack is inactive
  # - package-ecosystem: "pip"
  #   directory: "/agents"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #     time: "03:00"
  #     timezone: "Europe/Berlin"
  #   open-pull-requests-limit: 5
  #   labels:
  #     - "dependencies"
  #     - "agents"
  #     - "python"

  # Frontend npm dependencies (React, Vite, Tailwind, etc.)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    reviewers:
      - "project-frontend-team"
    labels:
      - "dependencies"
      - "frontend"
      - "javascript"
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"
    # Group minor and patch updates to reduce PR noise
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # Pin toolchain versions — only upgrade when the current version reaches EOL
    ignore:
      # Stay on ESLint 9 (EOL 2026-08-06) — v10 is a breaking major
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      # Stay on @types/node 24.x to match our Node 24 LTS target
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
